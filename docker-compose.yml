
services:

    app:
        build: .
        container_name: talis-app

        working_dir: /var/www

        volumes:
            - ./:/var/www

        ports:
            - "8000:8000"

        depends_on:
            - mysql
            - redis

    queue:
        build: .
        container_name: talis-queue

        command: php artisan queue:work

        working_dir: /var/www

        volumes:
            - ./:/var/www

        depends_on:
            - redis

    mysql:
        image: mysql:8.0

        container_name: talis-mysql

        environment:
            MYSQL_DATABASE: talis_db
            MYSQL_ROOT_PASSWORD: root

        ports:
            - "3307:3306"

    redis:
        image: redis:latest

        container_name: talis-redis

        ports:
            - "6379:6379"
